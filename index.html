<!DOCTYPE html>
<html>

<head>
<title>Contact Form</title>
<link rel="stylesheet" href="style.css">
<script src="form.js" defer></script>
</head>

<body>

<div class="container">

<h2>Contact Us</h2>

<form id="contactForm">

<div class="form-group">
<label for="name">Name</label>
<input type="text" id="name" placeholder="Enter your name" required>
<small id="nameMsg" class="msg"></small>
</div>

<div class="form-group">
<label for="email">Email</label>
<input type="text" id="email" placeholder="Enter your email" required>
<small id="emailMsg" class="msg"></small>
</div>

<div class="form-group">
<label for="password">Password</label>
<input type="password" id="password" placeholder="Enter password" required>
<small id="passMsg" class="msg"></small>
</div>

<div class="form-group">
<label for="phone">Phone</label>
<input type="text" id="phone" placeholder="Enter 10 digit phone number" maxlength="10" required>
<small id="phoneMsg" class="msg"></small>
</div>

<button type="submit" class="submit-btn">Submit</button>

</form>

</div>

</body>
</html>
